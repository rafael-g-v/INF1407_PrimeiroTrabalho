{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remover Membro - Gerência de Projetos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'Core/css/styles.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'Core:home' %}">Gerência de Projetos</a>
            <div class="ms-auto">
                <a href="{% url 'Core:logout' %}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 500px;">
        <div class="card border-warning">
            <div class="card-body text-center p-4">
                <h4 class="card-title mb-3">Remover membro</h4>
                <p class="card-text">
                    Deseja remover <strong>{{ membro.usuario.perfil.nome }} {{ membro.usuario.perfil.sobrenome }}</strong>
                    do projeto <strong>{{ projeto.nome }}</strong>?
                </p>
                <div class="d-flex gap-3 justify-content-center mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-warning">Confirmar remoção</button>
                    </form>
                    <a href="{% url 'Core:projeto_detalhe' projeto.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
