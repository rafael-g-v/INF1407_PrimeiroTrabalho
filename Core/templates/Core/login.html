{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerência de Projetos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'Core/css/styles.css' %}">
</head>
<body>
    <section class="auth-hero-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card bg-dark text-white form-card">
                        <h2 class="mb-4 text-center">Login</h2>
                        <form method="post" style="flex: 1; display: flex; flex-direction: column;">
                            {% csrf_token %}
                            <div class="form-group">
                                <label for="username" class="form-label">E-mail ou Matrícula</label>
                                <input type="text" class="form-control" id="username" name="username" autocomplete="off" required>
                            </div>
                            <div class="form-group">
                                <label for="password" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            {% if error %}
                                <div class="alert alert-danger">{{ error }}</div>
                            {% endif %}
                            <div class="mt-auto text-center">
                                <button type="submit" class="btn btn-primary btn-narrow">Entrar</button>
                                <div class="mt-3">
                                    <span>Não tem uma conta? <a href="{% url 'Core:registrar' %}" class="text-white">Cadastre-se</a></span>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
